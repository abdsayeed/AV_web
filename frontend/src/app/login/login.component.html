<main class="min-h-screen flex flex-col md:flex-row bg-surface text-on-surface font-body overflow-hidden">
  
  <!-- Left Panel -->
  <section class="md:w-[45%] bg-primary-container p-12 lg:p-20 flex flex-col justify-between relative overflow-hidden">
    <!-- Ambient Blob -->
    <div class="absolute -bottom-32 -left-32 w-96 h-96 bg-secondary/20 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <div class="relative z-10">
      <!-- Logo -->
      <div class="cursor-pointer inline-flex items-center gap-3" (click)="goToHome()">
        <img src="assets/logo.png" alt="Aries Ventures" class="h-9 w-9 object-contain brightness-0 invert" style="image-rendering: crisp-edges;">
        <span class="text-2xl font-headline font-bold text-on-primary tracking-tighter">Aries Ventures</span>
      </div>

      <!-- Tagline & Social Proof -->
      <div class="mt-20 cinematic-reveal">
        <h1 class="text-4xl lg:text-5xl font-headline font-bold text-on-primary mb-12">Your business, live in days.</h1>
        <ul class="space-y-4">
          <li class="flex items-center gap-3 text-on-primary/80 font-medium text-lg">
            <span class="material-symbols-outlined text-secondary">check_circle</span>
            50+ businesses launched
          </li>
          <li class="flex items-center gap-3 text-on-primary/80 font-medium text-lg">
            <span class="material-symbols-outlined text-secondary">check_circle</span>
            Avg. 4.9★ satisfaction
          </li>
          <li class="flex items-center gap-3 text-on-primary/80 font-medium text-lg">
            <span class="material-symbols-outlined text-secondary">check_circle</span>
            3–5 day delivery
          </li>
        </ul>
      </div>
    </div>

    <!-- Footer of Panel -->
    <div class="relative z-10 mt-20">
      <p class="text-on-primary/60 font-medium">
        New here? 
        <button (click)="goToRegister()" class="text-secondary hover:text-secondary-fixed transition-colors">Create an account &rarr;</button>
      </p>
    </div>
  </section>

  <!-- Right Panel -->
  <section class="flex-1 bg-surface-container-lowest p-8 lg:p-20 flex items-center justify-center">
    <div class="max-w-md w-full cinematic-reveal" style="transition-delay: 100ms">
      <h2 class="text-3xl font-headline font-bold text-on-surface mb-8">Welcome back</h2>

      @if (errorMessage) {
        <div class="bg-error/10 text-error rounded-xl px-4 py-3 mb-6 flex items-start gap-3">
          <span class="material-symbols-outlined text-xl shrink-0 mt-0.5">error</span>
          <span class="text-sm font-medium">{{ errorMessage }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-5">
        
        <!-- Email Input -->
        <div>
          <label class="block text-sm font-semibold text-on-surface mb-2 pointer-events-none">Email Address</label>
          <input type="email" 
                 name="email"
                 [(ngModel)]="loginData.email"
                 required
                 class="w-full px-5 py-4 rounded-xl bg-surface-container border border-outline-variant/15 text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary transition-all"
                 placeholder="name@business.com">
        </div>

        <!-- Password Input -->
        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="block text-sm font-semibold text-on-surface pointer-events-none">Password</label>
            <button type="button" (click)="onForgotPassword()" class="text-sm font-semibold text-secondary hover:text-secondary-container transition-colors">Forgot password?</button>
          </div>
          <div class="relative w-full">
            <input [type]="showPassword ? 'text' : 'password'" 
                   name="password"
                   [(ngModel)]="loginData.password"
                   required
                   class="w-full px-5 py-4 pr-12 rounded-xl bg-surface-container border border-outline-variant/15 text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary transition-all"
                   placeholder="Enter your password">
            <button type="button" (click)="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors flex items-center">
              <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" 
                [disabled]="isLoading"
                class="w-full py-4 mt-4 rounded-full bg-secondary text-on-primary font-bold text-lg hover:bg-secondary-container transition-all active:scale-95 disabled:opacity-50 disabled:pointer-events-none flex items-center justify-center gap-2">
          @if (isLoading) {
            <span class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          } @else {
            Sign In
          }
        </button>

        <div class="flex items-center gap-4 my-8">
          <div class="h-px flex-1 bg-outline-variant/20"></div>
          <span class="text-sm text-on-surface-variant font-medium uppercase tracking-wider">OR</span>
          <div class="h-px flex-1 bg-outline-variant/20"></div>
        </div>

        <!-- Google OAuth -->
        <button type="button" 
                class="w-full py-4 rounded-full bg-surface-container-lowest border border-outline-variant/20 text-on-surface font-semibold hover:bg-surface-container transition-all active:scale-95 flex items-center justify-center gap-3">
          <svg viewBox="0 0 24 24" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </form>
    </div>
  </section>
</main>
