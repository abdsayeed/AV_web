<!DOCTYPE html>
<html>
<head>
    <title>Favicon Test</title>
</head>
<body>
    <h1>Favicon File Test</h1>
    <p>Check if these files load:</p>
    
    <div>
        <h3>ICO File:</h3>
        <img src="favicon.ico" alt="favicon.ico" style="width: 32px; height: 32px;">
        <a href="favicon.ico" target="_blank">Open favicon.ico</a>
    </div>
    
    <div>
        <h3>SVG File:</h3>
        <img src="favicon.svg" alt="favicon.svg" style="width: 32px; height: 32px;">
        <a href="favicon.svg" target="_blank">Open favicon.svg</a>
    </div>
    
    <div>
        <h3>PNG File (96x96):</h3>
        <img src="favicon-96x96.png" alt="favicon-96x96.png" style="width: 32px; height: 32px;">
        <a href="favicon-96x96.png" target="_blank">Open favicon-96x96.png</a>
    </div>
    
    <div>
        <h3>PNG File (192x192):</h3>
        <img src="web-app-manifest-192x192.png" alt="web-app-manifest-192x192.png" style="width: 32px; height: 32px;">
        <a href="web-app-manifest-192x192.png" target="_blank">Open web-app-manifest-192x192.png</a>
    </div>
</body>
</html>
