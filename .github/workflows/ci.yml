name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Django — lint, type-check, tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aries_test
          POSTGRES_USER: aries_user
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r apps/api/requirements/dev.txt
        working-directory: .

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.base
          DB_NAME: aries_test
          DB_USER: aries_user
          DB_PASSWORD: testpass
          DB_HOST: localhost
          SECRET_KEY: ci-secret-key-not-for-production
          DEBUG: "True"
        run: python manage.py migrate --noinput
        working-directory: apps/api

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.base
          DB_NAME: aries_test
          DB_USER: aries_user
          DB_PASSWORD: testpass
          DB_HOST: localhost
          SECRET_KEY: ci-secret-key-not-for-production
          DEBUG: "True"
        run: pytest --tb=short -q
        working-directory: apps/api

  frontend:
    name: Angular — lint, type-check, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: frontend

      - name: Build (production)
        run: npm run build -- --configuration production
        working-directory: frontend
