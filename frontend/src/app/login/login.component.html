<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
  
  <!-- Animated Background Logo -->
  <div class="absolute inset-0 flex items-center justify-center opacity-5">
    <img src="assets/logo.png" 
         alt="Background Logo" 
         class="w-[800px] h-[800px] object-contain animate-pulse-slow">
  </div>

  <!-- Floating Particles Animation -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>
    <div class="particle particle-5"></div>
  </div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md animate-fade-in-up">
    
    <!-- Logo Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-2xl shadow-2xl shadow-blue-600/50 mb-4 animate-bounce-slow">
        <img src="assets/logo.png" 
             alt="Aries Ventures" 
             class="w-16 h-16 object-contain">
      </div>
      <h1 class="text-3xl font-black text-white mb-2">Welcome Back</h1>
      <p class="text-blue-200">Sign in to your Aries Ventures account</p>
    </div>

    <!-- Login Form Card -->
    <div class="bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/20 p-8 animate-slide-in">
      
      <form (ngSubmit)="onSubmit()" class="space-y-6">
        
        <!-- Error Message -->
        <div *ngIf="errorMessage" class="bg-red-500/20 border border-red-500/50 rounded-xl p-4 mb-4">
          <div class="flex items-center gap-2">
            <span class="text-red-400 text-xl">⚠️</span>
            <p class="text-red-200 text-sm">{{ errorMessage }}</p>
          </div>
        </div>

        <!-- Email Field -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-white">Email Address</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="text-blue-300 text-xl">📧</span>
            </div>
            <input type="email" 
                   [(ngModel)]="loginData.email"
                   name="email"
                   required
                   placeholder="you@example.com"
                   class="w-full pl-12 pr-4 py-3 bg-white/10 border-2 border-white/20 rounded-xl text-white placeholder-blue-200/50 focus:border-blue-400 focus:bg-white/20 transition-all outline-none">
          </div>
        </div>

        <!-- Password Field -->
        <div class="space-y-2">
          <label class="block text-sm font-bold text-white">Password</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="text-blue-300 text-xl">🔒</span>
            </div>
            <input [type]="showPassword ? 'text' : 'password'"
                   [(ngModel)]="loginData.password"
                   name="password"
                   required
                   placeholder="Enter your password"
                   class="w-full pl-12 pr-12 py-3 bg-white/10 border-2 border-white/20 rounded-xl text-white placeholder-blue-200/50 focus:border-blue-400 focus:bg-white/20 transition-all outline-none">
            <button type="button"
                    (click)="togglePassword()"
                    class="absolute inset-y-0 right-0 pr-4 flex items-center text-blue-300 hover:text-white transition-colors">
              <span class="text-xl">{{ showPassword ? '👁️' : '👁️‍🗨️' }}</span>
            </button>
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" 
                   [(ngModel)]="loginData.rememberMe"
                   name="rememberMe"
                   class="w-4 h-4 rounded border-2 border-white/20 bg-white/10 text-blue-600 focus:ring-2 focus:ring-blue-400">
            <span class="text-sm text-blue-200 group-hover:text-white transition-colors">Remember me</span>
          </label>
          <a href="#" 
             (click)="onForgotPassword(); $event.preventDefault()"
             class="text-sm text-blue-300 hover:text-white transition-colors font-medium">
            Forgot password?
          </a>
        </div>

        <!-- Submit Button -->
        <button type="submit"
                [disabled]="isLoading"
                class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-600/50 hover:shadow-blue-600/70 hover:scale-105 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="flex items-center gap-2">
            <span class="animate-spin">⏳</span>
            Signing in...
          </span>
        </button>

      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-white/20"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-transparent text-blue-200">Or continue with</span>
        </div>
      </div>

      <!-- Auth0 & Social Login -->
      <div class="space-y-3 mb-4">
        <!-- Auth0 Universal Login -->
        <button type="button" 
                (click)="loginWithAuth0()"
                class="w-full flex items-center justify-center gap-3 py-3 bg-white/10 border-2 border-white/20 rounded-xl text-white hover:bg-white/20 hover:border-white/30 transition-all">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.568 8.16c-.169 1.858-.896 3.433-2.106 4.72-.906.965-2.033 1.69-3.36 2.175-.883.323-1.851.495-2.902.495-1.05 0-2.019-.172-2.902-.495-1.327-.485-2.454-1.21-3.36-2.175C1.328 11.593.6 10.018.432 8.16c-.014-.155-.022-.312-.022-.47 0-.158.008-.315.022-.47.169-1.858.896-3.433 2.106-4.72.906-.965 2.033-1.69 3.36-2.175C6.781.002 7.75-.17 8.8-.17s2.019.172 2.902.495c1.327.485 2.454 1.21 3.36 2.175 1.21 1.287 1.937 2.862 2.106 4.72.014.155.022.312.022.47 0 .158-.008.315-.022.47z"/>
          </svg>
          <span class="font-medium">Continue with Auth0</span>
        </button>

        <!-- Social Login Options -->
        <div class="grid grid-cols-2 gap-3">
          <button type="button" 
                  (click)="loginWithGoogle()"
                  class="flex items-center justify-center gap-2 py-3 bg-white/10 border-2 border-white/20 rounded-xl text-white hover:bg-white/20 hover:border-white/30 transition-all">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span class="font-medium">Google</span>
          </button>
          <button type="button"
                  (click)="loginWithFacebook()"
                  class="flex items-center justify-center gap-2 py-3 bg-white/10 border-2 border-white/20 rounded-xl text-white hover:bg-white/20 hover:border-white/30 transition-all">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            <span class="font-medium">Facebook</span>
          </button>
        </div>
      </div>

      <!-- Register Link -->
      <div class="mt-6 text-center">
        <p class="text-blue-200">
          Don't have an account? 
          <button (click)="goToRegister()"
                  class="text-white font-bold hover:text-blue-300 transition-colors ml-1">
            Sign up
          </button>
        </p>
      </div>

      <!-- Back to Home -->
      <div class="mt-4 text-center">
        <button (click)="goToHome()"
                class="text-blue-300 hover:text-white transition-colors text-sm flex items-center justify-center gap-1 mx-auto">
          <span>←</span>
          <span>Back to Home</span>
        </button>
      </div>

    </div>

  </div>

</div>
